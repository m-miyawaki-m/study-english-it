<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Target 1900 フラッシュカード</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem}
#app{width:100%;max-width:440px;display:flex;flex-direction:column;gap:0.75rem}
h1{font-size:16px;font-weight:500;color:#444;text-align:center;padding:0.5rem 0}
#top-bar{display:flex;align-items:center;justify-content:space-between}
#progress-text{font-size:13px;color:#888}
#meaning-btn{font-size:13px;padding:6px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#666;cursor:pointer}
#meaning-btn.active{background:#f0f0ee;color:#333;border-color:#aaa}
#progress-bar-wrap{width:100%;height:5px;background:#e5e5e0;border-radius:3px}
#progress-bar{height:5px;background:#1D9E75;border-radius:3px;transition:width 0.3s}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:4px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#888;cursor:pointer}
.filter-btn.active{background:#eee;color:#333;border-color:#aaa}
.range-row{display:flex;align-items:center;gap:6px;font-size:13px;color:#888}
.range-row input{width:58px;padding:3px 6px;border:1px solid #ddd;border-radius:6px;font-size:13px;text-align:center}
#card-area{display:flex;align-items:center;justify-content:center;padding:0.5rem 0;min-height:220px;position:relative;user-select:none}
#card{width:100%;background:#fff;border:1px solid #e8e8e5;border-radius:16px;padding:1.75rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:0.65rem;cursor:grab;touch-action:pan-y;position:relative;transition:transform 0.08s,opacity 0.08s;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
#card.dragging{transition:none;cursor:grabbing}
#card.fly-right{transform:translateX(130%) rotate(14deg)!important;opacity:0!important;transition:transform 0.28s ease,opacity 0.28s ease!important}
#card.fly-left{transform:translateX(-130%) rotate(-14deg)!important;opacity:0!important;transition:transform 0.28s ease,opacity 0.28s ease!important}
.hint{position:absolute;top:12px;font-size:12px;font-weight:500;padding:3px 10px;border-radius:6px;opacity:0;transition:opacity 0.12s}
#hint-l{left:12px;background:#FCEBEB;color:#A32D2D}
#hint-r{right:12px;background:#EAF3DE;color:#3B6D11}
#card-no{font-size:11px;color:#bbb;align-self:flex-start}
#pos-badge{font-size:11px;padding:2px 8px;border-radius:6px;background:#EBF4FF;color:#2563EB}
#word{font-size:30px;font-weight:600;color:#222;text-align:center}
#phonetic{font-size:14px;color:#999}
#meaning-area{width:100%;border-top:1px solid #eee;padding-top:0.75rem;display:none}
#meaning-area.visible{display:block}
#meaning-jp{font-size:15px;font-weight:500;color:#333;text-align:center;line-height:1.6}
#btn-row{display:flex;gap:10px}
#btn-no,#btn-yes{flex:1;padding:12px;border-radius:8px;border:1px solid;font-size:14px;cursor:pointer;transition:background 0.12s,transform 0.1s}
#btn-no{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
#btn-no:hover{background:#F7C1C1}
#btn-yes{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
#btn-yes:hover{background:#C0DD97}
#btn-no:active,#btn-yes:active{transform:scale(0.97)}
#result-screen{display:none;flex-direction:column;align-items:center;gap:1.25rem;padding:2rem 1rem}
#result-screen.visible{display:flex}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:280px}
.stat-card{background:#f0f0ee;border-radius:8px;padding:1rem;text-align:center}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600;color:#333}
.stat-val.g{color:#3B6D11}
.stat-val.r{color:#A32D2D}
.btn2{padding:10px 24px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:14px;cursor:pointer}
.btn-wrong{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
</style>
</head>
<body>
<div id="app">
  <h1>英単語ターゲット1900</h1>
  <div id="top-bar">
    <span id="progress-text">- / -</span>
    <button id="meaning-btn">意味を見る</button>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <div class="filter-row">
    <button class="filter-btn active" data-pos="all">すべて</button>
    <button class="filter-btn" data-pos="動詞">動詞</button>
    <button class="filter-btn" data-pos="名詞">名詞</button>
    <button class="filter-btn" data-pos="形容詞">形容詞</button>
    <button class="filter-btn" data-pos="副詞">副詞</button>
  </div>
  <div class="range-row">
    No.<input id="range-from" type="number" value="1" min="1" max="1900">〜<input id="range-to" type="number" value="1900" min="1" max="1900">
    <button class="filter-btn" id="apply-range">適用</button>
    <label style="margin-left:auto;display:flex;align-items:center;gap:4px;font-size:12px;">
      <input type="checkbox" id="shuffle-chk" checked> シャッフル
    </label>
  </div>
  <div id="card-area">
    <div id="card">
      <span class="hint" id="hint-l">知らない</span>
      <span class="hint" id="hint-r">知ってた</span>
      <span id="card-no"></span>
      <span id="pos-badge"></span>
      <div id="word"></div>
      <div id="phonetic"></div>
      <div id="meaning-area"><div id="meaning-jp"></div></div>
    </div>
  </div>
  <div id="btn-row">
    <button id="btn-no">✕ 知らない</button>
    <button id="btn-yes">✓ 知ってた</button>
  </div>
  <div id="result-screen">
    <div style="font-size:40px">🎉</div>
    <div style="font-size:20px;font-weight:600;color:#333">完了！</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">知ってた</div><div class="stat-val g" id="r-yes">0</div></div>
      <div class="stat-card"><div class="stat-label">知らなかった</div><div class="stat-val r" id="r-no">0</div></div>
      <div class="stat-card"><div class="stat-label">正答率</div><div class="stat-val" id="r-pct">0%</div></div>
      <div class="stat-card"><div class="stat-label">出題数</div><div class="stat-val" id="r-total">0</div></div>
    </div>
    <button class="btn2 btn-wrong" id="retry-wrong-btn">間違えた単語だけ再挑戦</button>
    <button class="btn2" id="retry-btn">最初からやり直す</button>
  </div>
</div>

let deck=[],idx=0,yesCount=0,noCount=0,wrongWords=[],isDragging=false,startX=0,currentX=0;
let currentPos="all",rangeFrom=1,rangeTo=1900;

function buildDeck(){
  deck=ALL_WORDS.filter(w=>{
    const n=parseInt(w.id);
    return(currentPos==="all"||w.pos===currentPos)&&n>=rangeFrom&&n<=rangeTo;
  });
  if(document.getElementById("shuffle-chk").checked)deck.sort(()=>Math.random()-0.5);
  idx=0;yesCount=0;noCount=0;wrongWords=[];
  document.getElementById("result-screen").classList.remove("visible");
  ["card-area","btn-row","top-bar","progress-bar-wrap"].forEach(id=>document.getElementById(id).style.display="");
  showCard();
}
function showCard(){
  if(idx>=deck.length){showResult();return;}
  const w=deck[idx];
  document.getElementById("card-no").textContent="No."+w.id;
  document.getElementById("pos-badge").textContent=w.pos;
  document.getElementById("word").textContent=w.word;
  document.getElementById("phonetic").textContent=w.phonetic;
  document.getElementById("meaning-jp").textContent=w.jp;
  document.getElementById("meaning-area").classList.remove("visible");
  document.getElementById("meaning-btn").classList.remove("active");
  document.getElementById("meaning-btn").textContent="意味を見る";
  const card=document.getElementById("card");
  card.style.transform="";card.style.opacity="";
  const pct=Math.round((idx+1)/deck.length*100);
  document.getElementById("progress-text").textContent=(idx+1)+" / "+deck.length;
  document.getElementById("progress-bar").style.width=pct+"%";
}
function swipe(dir){
  const card=document.getElementById("card");
  card.classList.add(dir===1?"fly-right":"fly-left");
  if(dir===1)yesCount++;else{noCount++;wrongWords.push(deck[idx]);}
  setTimeout(()=>{card.classList.remove("fly-right","fly-left");idx++;showCard();},290);
}

  document.getElementById("r-yes").textContent=yesCount;
  document.getElementById("r-no").textContent=noCount;
  document.getElementById("r-total").textContent=deck.length;
  document.getElementById("r-pct").textContent=Math.round(yesCount/deck.length*100)+"%";
  document.getElementById("retry-wrong-btn").style.display=wrongWords.length?"":"none";
}
document.getElementById("meaning-btn").addEventListener("click",()=>{
  const on=document.getElementById("meaning-area").classList.toggle("visible");
  document.getElementById("meaning-btn").classList.toggle("active",on);
  document.getElementById("meaning-btn").textContent=on?"意味を隠す":"意味を見る";
});
document.getElementById("btn-yes").addEventListener("click",()=>swipe(1));
document.getElementById("btn-no").addEventListener("click",()=>swipe(-1));
document.querySelectorAll(".filter-btn[data-pos]").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".filter-btn[data-pos]").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");currentPos=btn.dataset.pos;buildDeck();
}));
document.getElementById("apply-range").addEventListener("click",()=>{
  rangeFrom=parseInt(document.getElementById("range-from").value)||1;
  rangeTo=parseInt(document.getElementById("range-to").value)||1900;
  buildDeck();
});
document.getElementById("retry-btn").addEventListener("click",buildDeck);
document.getElementById("retry-wrong-btn").addEventListener("click",()=>{
  deck=[...wrongWords];
  if(document.getElementById("shuffle-chk").checked)deck.sort(()=>Math.random()-0.5);
  idx=0;yesCount=0;noCount=0;wrongWords=[];
  document.getElementById("result-screen").classList.remove("visible");
  ["card-area","btn-row","top-bar","progress-bar-wrap"].forEach(id=>document.getElementById(id).style.display="");
  showCard();
});
const card=document.getElementById("card");
function onStart(x){startX=x;currentX=x;isDragging=true;card.classList.add("dragging");}
function onMove(x){
  if(!isDragging)return;currentX=x;
  const dx=currentX-startX;
  card.style.transform=`translateX(${dx}px) rotate(${dx*0.05}deg)`;
  const r=Math.min(Math.abs(dx)/70,1);
  document.getElementById("hint-r").style.opacity=dx>15?r:0;
  document.getElementById("hint-l").style.opacity=dx<-15?r:0;
}
function onEnd(){
  if(!isDragging)return;isDragging=false;card.classList.remove("dragging");
  document.getElementById("hint-l").style.opacity=0;document.getElementById("hint-r").style.opacity=0;
  const dx=currentX-startX;
  if(dx>60)swipe(1);else if(dx<-60)swipe(-1);else{card.style.transform="";card.style.opacity="";}
}
card.addEventListener("mousedown",e=>onStart(e.clientX));
window.addEventListener("mousemove",e=>onMove(e.clientX));
window.addEventListener("mouseup",onEnd);
card.addEventListener("touchstart",e=>onStart(e.touches[0].clientX),{passive:true});
card.addEventListener("touchmove",e=>onMove(e.touches[0].clientX),{passive:true});
card.addEventListener("touchend",onEnd);
buildDeck();
</script>
</body>
</html>
